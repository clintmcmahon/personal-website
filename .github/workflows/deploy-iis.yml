name: Build & Deploy to IIS (self-hosted)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-iis
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [ self-hosted, Windows, X64 ]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore
        run: dotnet restore .\Website.csproj

      - name: Build (Release)
        run: dotnet build .\Website.csproj -c Release --no-restore

      - name: Publish (self-contained folder)
        shell: powershell
        run: |
          $pub = Join-Path $env:RUNNER_TEMP "publish"
          dotnet publish .\Website.csproj -c Release -o $pub --no-build
          Write-Host "Publish folder: $pub"
          echo "PUBLISH_DIR=$pub" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Ensure IIS site folder permissions (once)
        shell: powershell
        run: |
          $site = 'C:\websites\clintmcmahon.com'
          if (-not (Test-Path $site)) { New-Item -Path $site -ItemType Directory -Force | Out-Null }
          icacls $site /grant "NT AUTHORITY\NETWORK SERVICE:(OI)(CI)M" /T

      - name: Backup current site (zip)
        shell: powershell
        run: |
          $sitePath = 'C:\websites\clintmcmahon.com'
          $backupRoot = 'C:\websites\_backups'
          if (-not (Test-Path $backupRoot)) { New-Item $backupRoot -ItemType Directory | Out-Null }
          $stamp = Get-Date -Format 'yyyyMMdd-HHmmss'
          $dest = Join-Path $backupRoot "site-$stamp.zip"
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [IO.Compression.ZipFile]::CreateFromDirectory($sitePath, $dest)

      - name: Deploy publish output (live, no downtime)
        shell: powershell
        run: |
          $src = "$env:PUBLISH_DIR\"
          $dst = 'C:\websites\clintmcmahon.com\'

          if (-not (Test-Path $src)) { throw "Publish dir not found: $src" }
          if (-not (Test-Path $dst)) { throw "Destination not found: $dst" }

          # Shadow copy (enabled in web.config) means DLLs are loaded from a temp dir,
          # so originals are unlocked and can be overwritten while the app is running.
          # /XF and /XD protect server-side content that is never committed to git.
          robocopy $src $dst /MIR /XJ /R:2 /W:2 /XF appsettings.local.json *.db *.db-shm *.db-wal `
            /XD "$dst\.well-known" "$dst\logs" "$dst\uploads" "$dst\wwwroot\images" "$dst\wwwroot\photos"

          $rc = $LASTEXITCODE
          Write-Host "robocopy exit code: $rc"

          if ($rc -gt 3) { throw "robocopy failed with exit code $rc" }

      - name: Graceful recycle (zero-downtime restart)
        shell: powershell
        run: |
          $appPool = 'clintmcmahon.com'
          Import-Module WebAdministration

          # If pool was stopped for any reason, start it; otherwise recycle (graceful handoff).
          if ((Get-WebAppPoolState -Name $appPool).Value -eq 'Stopped') {
            Start-WebAppPool -Name $appPool
            Write-Host "AppPool was stopped — started."
          } else {
            Restart-WebAppPool -Name $appPool
            Write-Host "AppPool recycled gracefully."
          }

      - name: Smoke check
        shell: powershell
        continue-on-error: true
        run: |
          Start-Sleep -Seconds 3
          try {
            $resp = Invoke-WebRequest http://localhost/ -UseBasicParsing -TimeoutSec 10
            Write-Host "HTTP $($resp.StatusCode)"
          } catch { Write-Warning $_ }
