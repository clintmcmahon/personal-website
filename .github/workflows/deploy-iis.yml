name: Build & Deploy to IIS (self-hosted)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-iis
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [ self-hosted, Windows, X64 ]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish
        shell: powershell
        run: |
          $pub = Join-Path $env:RUNNER_TEMP "publish"
          dotnet publish .\Website.csproj -c Release -o $pub
          Write-Host "Publish folder: $pub"
          echo "PUBLISH_DIR=$pub" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Ensure IIS site folder permissions
        shell: powershell
        run: |
          $site = 'C:\websites\clintmcmahon.com'
          if (-not (Test-Path $site)) { New-Item -Path $site -ItemType Directory -Force | Out-Null }
          # Grant both identities — app pools may run as either NETWORK SERVICE or the pool's built-in identity
          icacls $site /grant "NT AUTHORITY\NETWORK SERVICE:(OI)(CI)M" /T /C
          icacls $site /grant "IIS AppPool\clintmcmahon.com:(OI)(CI)M" /T /C

      - name: Stop AppPool
        shell: powershell
        run: |
          $appPool = 'clintmcmahon.com'
          Import-Module WebAdministration
          if ((Get-WebAppPoolState -Name $appPool).Value -ne 'Stopped') {
            Stop-WebAppPool -Name $appPool
            # Wait for the process to release file locks
            $deadline = (Get-Date).AddSeconds(15)
            while ((Get-WebAppPoolState -Name $appPool).Value -ne 'Stopped' -and (Get-Date) -lt $deadline) {
              Start-Sleep -Milliseconds 200
            }
          }
          Write-Host "AppPool stopped."

      - name: Backup current site (zip)
        shell: powershell
        run: |
          $sitePath = 'C:\websites\clintmcmahon.com'
          $backupRoot = 'C:\websites\_backups'
          if (-not (Test-Path $backupRoot)) { New-Item $backupRoot -ItemType Directory | Out-Null }
          $stamp = Get-Date -Format 'yyyyMMdd-HHmmss'
          $dest = Join-Path $backupRoot "site-$stamp.zip"
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [IO.Compression.ZipFile]::CreateFromDirectory($sitePath, $dest)

      - name: Deploy publish output
        shell: powershell
        run: |
          $src = "$env:PUBLISH_DIR\"
          $dst = 'C:\websites\clintmcmahon.com\'

          if (-not (Test-Path $src)) { throw "Publish dir not found: $src" }
          if (-not (Test-Path $dst)) { throw "Destination not found: $dst" }

          # /XF and /XD protect server-side content that lives only on the server.
          # After this deploy lands web.config with shadow copy enabled, future deploys
          # can skip the stop/start and just recycle.
          robocopy $src $dst /MIR /XJ /R:2 /W:2 /XF appsettings.local.json *.db *.db-shm *.db-wal `
            /XD "$dst\.well-known" "$dst\logs" "$dst\uploads" "$dst\wwwroot\images" "$dst\wwwroot\photos"

          $rc = $LASTEXITCODE
          Write-Host "robocopy exit code: $rc"

          if ($rc -gt 3) { throw "robocopy failed with exit code $rc" }

      - name: Start AppPool
        shell: powershell
        run: |
          $appPool = 'clintmcmahon.com'
          Import-Module WebAdministration
          Start-WebAppPool -Name $appPool
          Write-Host "AppPool started."

      - name: Smoke check
        shell: powershell
        continue-on-error: true
        run: |
          Start-Sleep -Seconds 3
          try {
            $resp = Invoke-WebRequest http://localhost/ -UseBasicParsing -TimeoutSec 10
            Write-Host "HTTP $($resp.StatusCode)"
          } catch { Write-Warning $_ }
