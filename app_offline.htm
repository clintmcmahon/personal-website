<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Back in a moment — Clint McMahon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #fff;
      color: #183537;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    .site-name {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: .02em;
      margin-bottom: 3rem;
      color: #183537;
      text-decoration: none;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e0e6e6;
      border-top-color: #183537;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 2rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: .75rem;
    }

    p {
      font-size: 1rem;
      color: #5a7273;
      max-width: 340px;
      line-height: 1.6;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: .8rem;
      color: #a0b4b5;
    }
  </style>
</head>
<body>
  <span class="site-name">Clint McMahon</span>
  <div class="spinner"></div>
  <h1>Back in a moment</h1>
  <p>The site is being updated and will be back online shortly.</p>
  <footer>clintmcmahon.com</footer>
</body>
</html>
